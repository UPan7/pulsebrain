name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy source files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 91.99.143.15
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "src/,requirements.txt,Dockerfile,docker-compose.yml"
          target: /root/pulse-bot/

      - name: Rebuild and restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 91.99.143.15
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /root/pulse-bot
            docker compose build --no-cache
            docker compose up -d
            docker image prune -f
