version: '3.8'
services:
  yt-knowledge-bot:
    build: .
    container_name: pulse-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./knowledge:/app/knowledge
      - ./data:/app/data
      - ./channels.yml:/app/channels.yml
      - ./cookies.txt:/app/cookies.txt
      - ./proxy-1945686-credentials:/app/proxy-credentials:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
